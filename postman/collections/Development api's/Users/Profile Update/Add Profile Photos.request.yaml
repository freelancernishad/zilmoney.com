$kind: http-request
url: "{{baseUrl}}/api/user/photos"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "photos": [
            "https://example.com/photo1.jpg",
            "https://example.com/photo2.jpg"
        ]
    }
order: 5000
