$kind: http-request
description: |-
  Action: App\Http\Controllers\Zilmoney\AccountController@store
  Middleware: api
url: "{{baseUrl}}/api/zilmoney/accounts"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: >-
    {
        "account_holder_name": "Jane User",
        "account_nick_name": "Test Savings",
        "account_number": "1234567890",
        "routing_number": "098765432",
        "type": "savings",
        "phone_number": "+1-555-0100",
        "address_line1": "123 Main St",
        "address_line2": "Apt 4B",
        "city": "Metropolis",
        "state": "NY",
        "postal_code": "10001",
        "country": "USA",
        "email": "jane.checking@example.com",
        "next_check_starting_number": 1000,
        "ach_auth_form": {
            "account_number": "1234567890",
            "authorizer": "Jane User",
            "full_name": "Jane Doe User",
            "title": "Owner",
            "digital_sign_name": "Jane D User",
            "digital_sign": "hash_sign_123"
        }
    }
order: 3000
