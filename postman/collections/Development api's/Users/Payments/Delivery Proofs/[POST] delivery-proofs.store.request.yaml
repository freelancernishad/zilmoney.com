$kind: http-request
url: "{{baseUrl}}/api/zilmoney/payments/{payment}/delivery-proofs"
method: POST
headers:
  Accept: application/json
  Authorization: Bearer {{token}}
  Content-Type: application/json
pathVariables:
  - key: payment
    value: ""
    description: "Payment ID"
body:
  type: json
  content: >-
    {
      "file_path": "https://example.com/storage/proofs/delivery-signature.png",
      "original_name": "delivery-signature.png"
    }
order: 1000
