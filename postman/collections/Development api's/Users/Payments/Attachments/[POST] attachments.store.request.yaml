$kind: http-request
url: "{{baseUrl}}/api/zilmoney/payments/{payment}/attachments"
method: POST
headers:
  Accept: application/json
  Authorization: Bearer {{token}}
  Content-Type: application/json
pathVariables:
  - key: payment
    value: ""
    description: "Payment ID"
body:
  type: json
  content: >-
    {
      "file_path": "https://example.com/storage/attachments/invoice-123.pdf",
      "original_name": "invoice-123.pdf"
    }
order: 1000
