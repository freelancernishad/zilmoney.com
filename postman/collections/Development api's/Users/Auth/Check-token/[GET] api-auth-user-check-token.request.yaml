$kind: http-request
name: "[GET] api/auth/user/check-token"
description: |-
  Action: App\Http\Controllers\Auth\User\AuthUserController@checkToken
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/auth/user/check-token"
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
order: 1000
