$kind: http-request
name: "[POST] api/auth/user/logout"
description: |-
  Action: App\Http\Controllers\Auth\User\AuthUserController@logout
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/auth/user/logout"
method: POST
headers:
  Accept: application/json
