$kind: http-request
name: "[POST] api/auth/user/change-password"
description: |-
  Action: App\Http\Controllers\Auth\User\AuthUserController@changePassword
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/auth/user/change-password"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "current_password": "password123",
        "new_password": "newpassword123",
        "new_password_confirmation": "newpassword123"
    }
order: 1000
