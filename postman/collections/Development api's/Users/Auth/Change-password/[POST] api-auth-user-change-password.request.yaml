$kind: http-request
name: "[POST] api/auth/user/change-password"
description: |-
  Action: App\Http\Controllers\Auth\User\AuthUserController@changePassword
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/auth/user/change-password"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\n  \"current_password\": \"password\",\n  \"new_password\": \"newpassword123\",\n  \"new_password_confirmation\": \"newpassword123\"\n}"
order: 1000
