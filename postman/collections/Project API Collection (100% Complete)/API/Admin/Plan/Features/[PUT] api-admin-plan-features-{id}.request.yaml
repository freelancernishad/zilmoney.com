$kind: http-request
name: "[PUT] api/admin/plan/features/{id}"
description: |-
  Action: App\Http\Controllers\Admin\Plans\FeatureController@update
  Middleware: api, App\Http\Middleware\AuthenticateAdmin
url: "{{baseUrl}}/api/admin/plan/features/{id}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: id
    value: ""
