$kind: http-request
name: "[POST] api/admin/password/email"
description: |-
  Action: App\Http\Controllers\Auth\Admin\AdminPasswordResetController@sendResetLinkEmail
  Middleware: api
url: "{{baseUrl}}/api/admin/password/email"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "email": "admin@example.com",
        "redirect_url": "http:\/\/frontend.app\/admin\/reset-password"
    }
order: 1000
