$kind: http-request
name: "[POST] api/admin/password/reset"
description: |-
  Action: App\Http\Controllers\Auth\Admin\AdminPasswordResetController@reset
  Middleware: api
url: "{{baseUrl}}/api/admin/password/reset"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "token": "token_from_email",
        "email": "admin@example.com",
        "password": "newadminpass123",
        "password_confirmation": "newadminpass123"
    }
order: 1000
