$kind: http-request
name: "[PATCH] api/admin/users/{id}/reset-password"
description: >-
  Action:
  App\Http\Controllers\Admin\UserManagement\AdminUserController@resetPassword

  Middleware: api, App\Http\Middleware\AuthenticateAdmin
url: "{{baseUrl}}/api/admin/users/{id}/reset-password"
method: PATCH
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: id
    value: ""
    description: "Path parameter: id"
body:
  type: json
  content: |-
    {
        "password": "NewUserPassword123!"
    }
order: 5000
