$kind: http-request
name: "[PATCH] api/admin/support/{ticket}/status"
description: |-
  Action: App\Http\Controllers\Common\SupportAndConnect\Admin\AdminSupportTicketApiController@updateStatus
  Middleware: api, App\Http\Middleware\AuthenticateAdmin
url: "{{baseUrl}}/api/admin/support/{ticket}/status"
method: PATCH
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: ticket
    value: ""
    description: "Path parameter: ticket"
body:
  type: json
  content: |-
    {
        "status": "closed"
    }
order: 4000
