$kind: http-request
name: "[POST] api/admin/coupons/{id}"
description: |-
  Action: App\Http\Controllers\Admin\Coupon\CouponController@update
  Middleware: api, App\Http\Middleware\AuthenticateAdmin
url: "{{baseUrl}}/api/admin/coupons/{id}"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: id
    value: ""
    description: "Path parameter: id"
body:
  type: json
  content: "{\n  \"name\": \"Spring Sale\",\n  \"code\": \"SPRING20\",\n  \"type\": \"percentage\",\n  \"value\": 20,\n  \"is_active\": true,\n  \"valid_from\": \"2024-03-01\",\n  \"valid_until\": \"2024-06-01\",\n  \"associations\": [\n    {\n      \"item_id\": 1,\n      \"item_type\": \"plan\"\n    }\n  ]\n}"
order: 3000
