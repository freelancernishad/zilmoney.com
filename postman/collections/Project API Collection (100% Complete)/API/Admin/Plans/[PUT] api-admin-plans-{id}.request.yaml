$kind: http-request
name: "[PUT] api/admin/plans/{id}"
description: |-
  Action: App\Http\Controllers\Admin\Plans\PlanController@update
  Middleware: api, App\Http\Middleware\AuthenticateAdmin
url: "{{baseUrl}}/api/admin/plans/{id}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: id
    value: ""
    description: "Path parameter: id"
body:
  type: json
  content: "{\n  \"name\": \"Professional Plan\",\n  \"duration\": \"month\",\n  \"original_price\": 29.99,\n  \"monthly_price\": 24.99,\n  \"discount_percentage\": 15,\n  \"features\": [\n    \"Unlimited Checks\",\n    \"ACH Transfers\"\n  ]\n}"
order: 4000
