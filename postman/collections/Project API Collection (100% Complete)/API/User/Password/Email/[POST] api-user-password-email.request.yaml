$kind: http-request
name: "[POST] api/user/password/email"
description: >-
  Action:
  App\Http\Controllers\Auth\User\UserPasswordResetController@sendResetLinkEmail

  Middleware: api
url: "{{baseUrl}}/api/user/password/email"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "email": "newuser@example.com",
        "redirect_url": "http:\/\/frontend.app\/reset-password"
    }
order: 1000
