$kind: http-request
name: "[PUT] api/user/profile"
description: |-
  Action: App\Http\Controllers\User\UserManagement\UserController@update
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/user/profile"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "name": "User Updated Profile",
        "notes": "Updated via Postman"
    }
order: 2000
