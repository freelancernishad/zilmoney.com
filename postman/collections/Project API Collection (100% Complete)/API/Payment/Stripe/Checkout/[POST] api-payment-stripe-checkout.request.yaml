$kind: http-request
name: "[POST] api/payment/stripe/checkout"
description: |-
  Action: App\Http\Controllers\Gateways\StripeController@checkout
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/payment/stripe/checkout"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\n  \"items\": [\n    {\n      \"price_data\": {\n        \"currency\": \"usd\",\n        \"product_data\": {\n          \"name\": \"Sample Product\"\n        },\n        \"unit_amount\": 2000\n      },\n      \"quantity\": 1\n    }\n  ],\n  \"success_url\": \"https://example.com/success\",\n  \"cancel_url\": \"https://example.com/cancel\"\n}"
order: 1000
