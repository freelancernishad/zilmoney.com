$kind: http-request
name: "[POST] api/payment/stripe/subscribe"
description: |-
  Action: App\Http\Controllers\Gateways\StripeController@subscribe
  Middleware: api, App\Http\Middleware\AuthenticateUser
url: "{{baseUrl}}/api/payment/stripe/subscribe"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\n  \"price_id\": \"price_12345\",\n  \"success_url\": \"https://example.com/success\",\n  \"cancel_url\": \"https://example.com/cancel\"\n}"
