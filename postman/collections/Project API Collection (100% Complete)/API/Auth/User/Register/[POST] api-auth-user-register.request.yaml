$kind: http-request
name: "[POST] api/auth/user/register"
description: |-
  Action: App\Http\Controllers\Auth\User\AuthUserController@register
  Middleware: api
url: "{{baseUrl}}/api/auth/user/register"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "name": "New User",
        "email": "newuser@example.com",
        "password": "password123",
        "password_confirmation": "password123",
        "verify_url": "http:\/\/frontend.app\/verify"
    }
order: 1000
