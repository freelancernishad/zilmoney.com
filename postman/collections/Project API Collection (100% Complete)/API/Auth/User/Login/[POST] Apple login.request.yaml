$kind: http-request
description: |-
  Action: App\Http\Controllers\Auth\User\AuthUserController@login
  Middleware: api
url: "{{baseUrl}}/api/auth/user/login"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: |-
    {
        "identity_token": "identity_token"
    }
order: 3000
