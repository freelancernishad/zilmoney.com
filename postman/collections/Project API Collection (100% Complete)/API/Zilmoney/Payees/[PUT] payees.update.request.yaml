$kind: http-request
description: |-
  Action: App\Http\Controllers\Zilmoney\PayeeController@update
  Middleware: api
url: "{{baseUrl}}/api/zilmoney/payees/{payee}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: payee
    value: ""
    description: "Path parameter: payee"
body:
  type: json
  content: "{\n  \"type\": \"vendor\",\n  \"payee_name\": \"ACME Corp\",\n  \"email\": \"vendor@example.com\",\n  \"entity_type\": \"business\",\n  \"bank_account\": {\n    \"account_holder_name\": \"ACME Corp\",\n    \"routing_number\": \"123456789\",\n    \"account_number\": \"987654321\",\n    \"account_type\": \"checking\"\n  }\n}"
order: 4000
