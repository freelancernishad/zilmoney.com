$kind: http-request
description: |-
  Action: App\Http\Controllers\Zilmoney\AccountController@update
  Middleware: api
url: "{{baseUrl}}/api/zilmoney/accounts/{account}"
method: PUT
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: account
    value: ""
    description: "Path parameter: account"
body:
  type: json
  content: "{\n  \"account_holder_name\": \"John Doe\",\n  \"account_nick_name\": \"Main Checking\",\n  \"account_number\": \"1234567890\",\n  \"routing_number\": \"123456789\",\n  \"type\": \"checking\"\n}"
order: 4000
