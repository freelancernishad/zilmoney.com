$kind: http-request
name: "[POST] api/twilio/send-sms"
description: |-
  Action: App\Http\Controllers\Common\Twilio\TwilioController@send
  Middleware: api
url: "{{baseUrl}}/api/twilio/send-sms"
method: POST
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
body:
  type: json
  content: "{\n  \"to\": \"+1234567890\",\n  \"message\": \"Your verification code is 123456\"\n}"
order: 1000
