$kind: http-request
name: "[GET] api/email/verify/{hash}"
description: |-
  Action: App\Http\Controllers\Auth\User\VerificationController@verifyEmail
  Middleware: api
url: "{{baseUrl}}/api/email/verify/{hash}"
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
pathVariables:
  - key: hash
    value: ""
    description: "Path parameter: hash"
order: 1000
