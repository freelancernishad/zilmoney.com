$kind: http-request
description: >-
  Action: App\Http\Controllers\Admin\AdminDashboardController@index

  Middleware: web, App\Http\Middleware\AttachJwtFromCookie,
  App\Http\Middleware\AuthenticateAdmin
url: "{{baseUrl}}/admin/dashboard"
method: GET
headers:
  Accept: application/json
  Content-Type: application/json
  Authorization: Bearer {{token}}
order: 1000
